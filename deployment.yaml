apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-go
  template:
    metadata:
      labels:
        app: hello-go
    spec:
      containers:
      - name: hello-go
        image: shelbyfamily/hello-go:latest
        # 每次重启都拉最新镜像，适配CI自动更新的latest
        imagePullPolicy: Always