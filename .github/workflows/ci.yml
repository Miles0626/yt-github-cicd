name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - uses: actions/checkout@v4
      # 安装Go环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      # 依赖整理
      - name: Go Mod Tidy
        run: go mod tidy
      # 单元测试
      - name: Run Test
        run: go test -v ./...
      # 编译二进制
      - name: Build App
        run: go build -o hello-app main.go
      # 运行编译后的程序验证输出
      - name: Run Program
        run: ./hello-app